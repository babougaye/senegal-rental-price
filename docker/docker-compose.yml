name: senegal-rental-price

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: senegal-rental-api:local
    container_name: senegal-rental-api
    ports:
      - "8000:8000"
    environment:
      SRP_MODEL_DIR: /app/models
      SRP_MODEL_NAME: random_forest
      SRP_LOG_LEVEL: INFO
    volumes:
      - ../models:/app/models:ro
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: senegal-rental-frontend:local
    container_name: senegal-rental-frontend
    ports:
      - "8502:8502"
    environment:
      SRP_API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  frontend-react:
    profiles: ["react"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend-react
      args:
        # Construit en dur dans le bundle JS : doit être joignable depuis le
        # navigateur de l'utilisateur (pas depuis le réseau Docker interne),
        # donc l'URL publiée de l'API, pas le nom de service "api".
        VITE_API_URL: http://localhost:8000
    image: senegal-rental-frontend-react:local
    container_name: senegal-rental-frontend-react
    ports:
      - "5174:80"
    depends_on:
      - api
    restart: unless-stopped

  mlflow:
    # Version alignée sur le paquet "mlflow" épinglé dans pyproject.toml —
    # un décalage de version entre client et serveur casse mlflow.<flavor>.log_model()
    # (endpoint REST /logged-models introduit dans les versions récentes du client).
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: senegal-rental-mlflow
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:///mlflow_data/mlflow.db
      --default-artifact-root /mlflow_data/artifacts
    ports:
      - "5000:5000"
    volumes:
      - ../mlflow_data:/mlflow_data
    restart: unless-stopped
